name: Build FRAME images

on:
  push:
    branches:
      - 'master'
      - 'main'
    tags:
      - '*'
  pull_request:
  merge_group:
  release:
  workflow_dispatch:
    inputs:
      git-ref:
        description: 'Git ref (optional)'
        required: false

env:
  CTR_IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  CTR_IMAGE_NAME: 'firmware-image-server'
  PUSH_CTR_IMAGE: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork || github.event_name == 'push' }}
  MAIN_BRANCH: 'main' # pushing to this branch will update the "edge" tag on the container image

jobs:
  build-fw-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        prefix:
          # - UC2_2
          - UC2_3
          # - UC2_4
          # - UC2_WEMOS
          - seeed_xiao_esp32s3
          # - seeed_xiao_esp32c3
          # - waveshare
          # - esp32
          # - m5stack
          # - uc2lasercover

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install PlatformIO and tools
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Extract environment list
        id: get_envs
        run: |
          set -eux
          envs="$(pio project config | grep 'env:' | cut -d ':' -f 2 | sort -u)"
          envs="$(grep -v -e '_debug$' -e '_default$' -e '_Xiao$' <<<$envs | grep '^${{ matrix.prefix }}')"
          echo "Environments:"
          echo "$envs"
          echo "envs=$(echo "$envs" | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_OUTPUT

      - name: Build all environments
        run: |
          failed=""
          mkdir -p build/fw-images
          pio boards --json-output > boards.json
          IFS=',' read -ra ENVS <<< "${{ steps.get_envs.outputs.envs }}"
          for ENV in "${ENVS[@]}"; do
            echo "==> Building $ENV"
            if ! pio run --environment "$ENV"; then
              echo "❌ Build failed for $ENV — continuing with others."
              failed=true
              continue
            fi

            BIN_DIR=".pio/build/$ENV"
            if [[ ! -f "$BIN_DIR/firmware.bin" ]]; then
              echo "⚠️ Skipping merge for $ENV — firmware.bin not found."
              failed=true
              continue
            fi

            # ------------------------------------------------------------------
            # Resolve the board id for this environment, following 'extends'
            # chains in platformio.ini.  A simple grep -A 20 fails when the
            # target env uses 'extends' and has no 'board =' of its own
            # (e.g. seeed_xiao_esp32s3 → UC2_3_Xiao → board = seeed_xiao_esp32s3).
            # We walk the chain with Python so every inherited board is found.
            # ------------------------------------------------------------------
            BOARD=$(python3 - "$ENV" <<'PYEOF'
import sys, re, configparser

env_name = sys.argv[1]

# configparser handles [env:X] sections natively
cfg = configparser.RawConfigParser()
cfg.read("platformio.ini")

def get_with_extends(section, key):
    """Walk the extends chain to find 'key' in 'section' or any parent."""
    visited = set()
    queue = [section]
    while queue:
        sec = queue.pop(0)
        if sec in visited:
            continue
        visited.add(sec)
        if cfg.has_section(sec) and cfg.has_option(sec, key):
            return cfg.get(sec, key).strip()
        # Follow extends
        if cfg.has_section(sec) and cfg.has_option(sec, "extends"):
            parents = [p.strip() for p in cfg.get(sec, "extends").split(",")]
            queue.extend(parents)
    return ""

section = f"env:{env_name}"
board = get_with_extends(section, "board")
print(board)
PYEOF
)
            CHIP=$(jq -r ".[] | select(.id==\"$BOARD\") | .mcu" boards.json)
            # Normalise to lowercase so the pattern match is case-insensitive
            # (pio boards may return "ESP32S3", "esp32s3", etc.)
            CHIP_LOWER="${CHIP,,}"
            echo "==> Board: $BOARD  MCU (raw): $CHIP  MCU (lower): $CHIP_LOWER"

            # ---------------------------------------------------------------
            # Set chip-specific flash parameters.
            #
            # ESP32-S3 / ESP32-C3 (RISC-V / LX7):
            #   - Bootloader lives at 0x0 (not 0x1000 like classic ESP32)
            #   - Flash mode must be qio  (platformio.ini: board_build.flash_mode = qio)
            #   - Flash freq 80m is the correct default for these chips
            #
            # Classic ESP32:
            #   - Bootloader at 0x1000
            #   - Flash mode dio, freq 40m are safe defaults
            #
            # Using the wrong flash_mode in merge_bin will overwrite the
            # binary header and produce "invalid header" / boot-loop errors.
            #
            # IMPORTANT: the chip detection MUST succeed before reaching the
            # merge step.  If CHIP_LOWER is empty (board not resolved) the else
            # branch fires and produces a broken classic-ESP32 binary.
            # ---------------------------------------------------------------
            if [[ -z "$CHIP_LOWER" ]]; then
              echo "❌ Could not determine chip type for $ENV (board='$BOARD') — skipping merge."
              failed=true
              continue
            elif [[ "$CHIP_LOWER" == *"s3"* ]]; then
              CHIP_ARG="esp32s3"
              BOOT_ADDR="0x0000"
              FLASH_MODE="qio"
              FLASH_FREQ="80m"
            elif [[ "$CHIP_LOWER" == *"c3"* ]]; then
              CHIP_ARG="esp32c3"
              BOOT_ADDR="0x0000"
              FLASH_MODE="qio"
              FLASH_FREQ="80m"
            else
              CHIP_ARG="esp32"
              BOOT_ADDR="0x1000"
              FLASH_MODE="dio"
              FLASH_FREQ="40m"
            fi

            echo "==> Copying binaries for $ENV (chip: $CHIP_ARG, flash_mode: $FLASH_MODE, flash_freq: $FLASH_FREQ)"
            OUT_BIN="build/fw-images/esp32_${ENV}.bin"
            cp "$BIN_DIR/firmware.bin" "$OUT_BIN"

            # Also produce a merged binary (bootloader + partitions + app in one file)
            # that can be flashed directly via esptool without specifying offsets:
            #
            #   esptool.py --chip <chip> write_flash 0x0 esp32_<ENV>_merged.bin
            #
            # Note: --target-offset is intentionally omitted so the merged image
            # starts at the lowest address present (the bootloader address).
            OUT_MERGED="build/fw-images/esp32_${ENV}_merged.bin"
            BOOT_APP0="$(find ~/.platformio -name "boot_app0.bin" | head -1)"
            if [[ -f "$BIN_DIR/bootloader.bin" && -f "$BIN_DIR/partitions.bin" && -n "$BOOT_APP0" ]]; then
              echo "==> Merging binaries for $ENV -> $OUT_MERGED"
              python -m esptool \
                --chip "$CHIP_ARG" \
                merge_bin \
                -o "$OUT_MERGED" \
                --flash_mode "$FLASH_MODE" \
                --flash_freq "$FLASH_FREQ" \
                --flash_size 4MB \
                "$BOOT_ADDR" "$BIN_DIR/bootloader.bin" \
                0x8000      "$BIN_DIR/partitions.bin" \
                0xe000      "$BOOT_APP0" \
                0x10000     "$BIN_DIR/firmware.bin"
            else
              echo "⚠️ Skipping merged binary for $ENV — required files not found."
              echo "   bootloader.bin : $(ls $BIN_DIR/bootloader.bin 2>/dev/null || echo MISSING)"
              echo "   partitions.bin : $(ls $BIN_DIR/partitions.bin 2>/dev/null || echo MISSING)"
              echo "   boot_app0.bin  : ${BOOT_APP0:-MISSING}"
            fi
          done
          if [ $failed == true ]; then
            echo "❌ One or more builds failed!"
            exit 1
          fi

      - name: Upload all merged binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-images-${{ matrix.prefix }}
          path: build/fw-images/

  build-server-ctr-image:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker-platform: linux/amd64
            gha-runner: ubuntu-24.04
          - docker-platform: linux/arm64
            gha-runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.gha-runner }}
    needs:
      - build-fw-images
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware images
        uses: actions/download-artifact@v4
        with:
          path: build/fw-images
          pattern: firmware-images-*
          merge-multiple: true

      # Work around a bug where capital letters in the GitHub username (e.g. "PlanktoScope") make it
      # impossible to push to GHCR. See https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase image registry and owner
        id: image_registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.CTR_IMAGE_REGISTRY }}/${{ env.CTR_IMAGE_NAME }}

      - name: Get Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_registry_case.outputs.lowercase }}
          tags: |
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.PUSH_CTR_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          platforms: ${{ matrix.docker-platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fw-server-build-${{ matrix.docker-platform }}
          cache-to: type=gha,mode=max,scope=fw-server-build-${{ matrix.docker-platform }}
          outputs: type=image,name=${{ steps.image_registry_case.outputs.lowercase }},push-by-digest=true,name-canonical=true,push=${{ env.PUSH_CTR_IMAGE }}

      - name: Export digest
        run: |
          mkdir -p /tmp/ctr-img-digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/ctr-img-digests/${digest#sha256:}"

      - name: Determine digest name
        run: |
          platform=${{ matrix.docker-platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: ctr-image-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/ctr-img-digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ctr-images:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs:
      - build-server-ctr-image
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/ctr-img-digests
          pattern: ctr-image-digests-*
          merge-multiple: true

      - name: Lowercase image registry and owner
        id: image_registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.CTR_IMAGE_REGISTRY }}/${{ env.CTR_IMAGE_NAME }}

      - name: Get actual commit SHA
        run: |
          if [[ -n "${{ github.event.pull_request.head.sha }}" ]]; then
            printf "ACTUAL_SHA=%.7s" "${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          elif [[ ${{ env.PUSH_CTR_IMAGE }} = "true" ]]; then
            printf "ACTUAL_SHA=%.7s" "${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Get Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          IS_MAIN_BRANCH: ${{ github.ref == format('refs/heads/{0}', env.MAIN_BRANCH) }}
        with:
          images: ${{ steps.image_registry_case.outputs.lowercase }}
          tags: |
            type=match,pattern=${{ env.TAG_PREFIX }}(.*),group=1
            type=edge,branch=${{ env.MAIN_BRANCH }}
            type=ref,event=pr
            type=raw,value=sha-${{ env.ACTUAL_SHA }},enable=${{ env.ACTUAL_SHA != '' }},priority=100

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.PUSH_CTR_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        if: env.PUSH_CTR_IMAGE == 'true'
        working-directory: /tmp/ctr-img-digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image_registry_case.outputs.lowercase }}@sha256:%s ' *)

      - name: Inspect image
        if: env.PUSH_CTR_IMAGE == 'true'
        run: |
          docker buildx imagetools inspect \
            ${{ steps.image_registry_case.outputs.lowercase }}:${{ steps.meta.outputs.version }}

  release:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build-fw-images
    if: github.event_name == 'push' && github.ref_type == 'tag'
    steps:
      - name: Download firmware images
        uses: actions/download-artifact@v4
        with:
          path: build/fw-images
          pattern: firmware-images
          merge-multiple: true

      - name: Determine release tag (or fallback)
        id: get_tag
        run: |
          TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "sha-$(git rev-parse --short HEAD)")
          echo "tag=$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Make new release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: build/fw-images/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

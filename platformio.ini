; ============================================================================
; CANopen environments
; Master: ESP32-dev, node-id 1, all controllers + DeviceRouter, upload 921600
; Slaves: XIAO ESP32-S3, single-function nodes (motor/laser/led/galvo)
;
; NOTE on cmake_extra_args: CMakeLists.txt uses CMake variables (e.g.
; GALVO_CONTROLLER EQUAL 1) to decide which source files to compile.
; These variables are set by expanding ${env:THIS.build_flags} into
; cmake_extra_args, keeping flags in sync with the compiler definitions.
; ============================================================================

; --- Shared XIAO slave base (no controller flags here) ---
[env:UC2_canopen_xiao_base]
extends = env:UC2_3_Xiao
lib_deps =
	paulstoffregen/OneWire@^2.3.7
	https://github.com/adafruit/Adafruit_NeoPixel.git
	teemuatlut/TMCStepper@^0.7.3
	gin66/FastAccelStepper @ ^0.31.5
	https://github.com/youseetoo/AccelStepper.git
	https://github.com/madhephaestus/ESP32Encoder.git
	symlink://lib/uc2_od
	symlink://lib/ESP32_CanOpenNode
lib_ldf_mode = deep+
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
upload_speed = 921600
build_flags =
	${env:UC2_3_Xiao.build_flags}
	-DESP32S3_MODEL_XIAO=1
	-DMESSAGE_CONTROLLER=1
	-DDIGITAL_IN_CONTROLLER=1
	-DCAN_BUS_ENABLED=1
	-DCAN_CONTROLLER_CANOPEN=1

; --- Motor slave (node-id 10-15, one FocusMotor axis per node) ---
[env:UC2_canopen_slave_motor]
extends = env:UC2_canopen_xiao_base
build_flags =
	${env:UC2_canopen_xiao_base.build_flags}
	-DNODE_ROLE=2
	-DMOTOR_CONTROLLER=1
	-DHOME_MOTOR=1
	;-DUSE_ACCELSTEP=1
	-DUSE_FASTACCEL=1
	-DTMC_CONTROLLER=1
	-DENCODER_CONTROLLER=1
	-DLINEAR_ENCODER_CONTROLLER=1
	-DCORE_DEBUG_LEVEL=5
board_build.cmake_extra_args =
	-DCONFIG=UC2_canopen_slave_motor
	-DCMAKE_C_COMPILER_LAUNCHER=ccache
	-DCMAKE_CXX_COMPILER_LAUNCHER=ccache
	${env:UC2_canopen_slave_motor.build_flags}

[env:UC2_canopen_slave_motor_release]
extends = env:UC2_canopen_slave_motor
build_unflags =
	-DCORE_DEBUG_LEVEL=5
build_flags =
	${env:UC2_canopen_slave_motor.build_flags}

[env:UC2_canopen_slave_motor_debug]
extends = env:UC2_canopen_slave_motor
build_type = debug
build_flags =
	${env:UC2_canopen_slave_motor.build_flags}
;	-O0
;    -g3
;    -DDEBUG
;    -DARDUINO_USB_CDC_ON_BOOT=1
;    -DARDUINO_USB_DFU_ON_BOOT=1
;    -DARDUINO_USB_MODE=0          ; Hardware CDC & JTAG  (required for debugging!)
;debug_tool          = esp-builtin
;upload_protocol     = esp-builtin
;debug_speed         = 10000       ; 10 MHz – lower if you see JTAG errors
; "manual" means PIO won't try to reset+halt automatically on connect,
; which is more stable on Windows 11 with the built-in USB driver.
;debug_load_mode     = manual
;debug_init_break    = tbreak setup
; Prevent the Serial Monitor from toggling DTR/RTS (would disturb JTAG)
;monitor_dtr = 0
;monitor_rts = 0
;debug_extra_cmds =
;    set remotetimeout 20
;    flushregs



; --- Laser slave (node-id 20-23, one laser channel per node) ---
[env:UC2_canopen_slave_laser]
extends = env:UC2_canopen_xiao_base
build_flags =
	${env:UC2_canopen_xiao_base.build_flags}
	-DNODE_ROLE=2
	-DLASER_CONTROLLER=1
	-DCORE_DEBUG_LEVEL=5
board_build.cmake_extra_args =
	-DCONFIG=UC2_canopen_slave_laser
	-DCMAKE_C_COMPILER_LAUNCHER=ccache
	-DCMAKE_CXX_COMPILER_LAUNCHER=ccache
	${env:UC2_canopen_slave_laser.build_flags}

[env:UC2_canopen_slave_laser_release]
extends = env:UC2_canopen_slave_laser
build_unflags =
	-DCORE_DEBUG_LEVEL=5
build_flags =
	${env:UC2_canopen_slave_laser.build_flags}
	-DCORE_DEBUG_LEVEL=0

; --- LED slave (node-id 25, NeoPixel array) ---
[env:UC2_canopen_slave_led]
extends = env:UC2_canopen_xiao_base
build_flags =
	${env:UC2_canopen_xiao_base.build_flags}
	-DNODE_ROLE=2
	-DLED_CONTROLLER=1
	-DLASER_CONTROLLER=1
	-DCORE_DEBUG_LEVEL=5

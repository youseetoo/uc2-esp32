; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = main
build_cache_dir = ~/.pio/build_cache

[env:esp32_framework]
platform = https://github.com/platformio/platform-espressif32.git#v6.3.2
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
framework =
	espidf
	arduino
debug_tool = esp-prog
debug_init_break = tbreak setup
monitor_filters = esp32_exception_decoder
board_build.cmake_extra_args =
    -DCMAKE_C_COMPILER_LAUNCHER=ccache
    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
;script now expects a folder like the env that its calling
;you can add a _debug behind the name to use the same pinconfig folder for a debug build
;like env:UC2_3 and env:UC2_3_debug
extra_scripts =
    pre:copy_PinConfig.py
    tools/canopen/canopen_targets.py

[env:esp32dev]
extends = env:esp32_framework
board = esp32dev
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.partitions = custom_partition.csv
board_upload.flash_size = 4MB
build_flags =
	-Wno-format
	-Wunused-variable
	-Wmissing-field-initializers
build_unflags = -Werror=all
upload_speed = 921600

[env:UC2_2_default]
extends = env:esp32dev
lib_deps =
	gin66/FastAccelStepper @ ^0.31.5
	https://github.com/adafruit/Adafruit_NeoPixel.git
	milesburton/DallasTemperature@^3.11.0
	paulstoffregen/OneWire@^2.3.7
	adafruit/Adafruit BusIO@^1.16.1
	adafruit/Adafruit GFX Library@^1.11.9
	robtillaart/TCA9555    @ ^0.4.4
	teemuatlut/TMCStepper@^0.7.3
build_flags =
	${env:esp32dev.build_flags}
	-DBLUETOOTH=1
	-DMOTOR_CONTROLLER=1
	#-DWIFI=1
	-DLASER_CONTROLLER=1
	-DLED_CONTROLLER=1
	-DDIGITAL_IN_CONTROLLER=1
	-DHOME_MOTOR=1
	-DMESSAGE_CONTROLLER=1
	-DDAC_CONTROLLER=1
	-DHEAT_CONTROLLER=1
	-DDS18B20_CONTROLLER=1
	-DBTHID=1
	-DUSE_FASTACCEL=1
	-DSTAGE_SCAN=1
board_build.cmake_extra_args =
	-DCONFIG=UC2_2
	${env:UC2_2_default.build_flags}

[env:UC2_2]
extends = env:UC2_2_default
build_flags =
	${env:UC2_2_default.build_flags}
	-DCORE_DEBUG_LEVEL=0

[env:UC2_2_debug]
extends = env:UC2_2_default
build_type = debug
build_flags =
	${env:UC2_2_default.build_flags}
	-DCORE_DEBUG_LEVEL=5



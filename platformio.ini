; --- DS4 USB-OTG -> CANopen bridge node ---
; Dedicated XIAO ESP32-S3 that reads a DualShock 4 controller over USB
; (HID host) and dispatches motor/laser/LED commands as expedited SDO
; writes to the matching slave nodes on the existing CANopen bus.
; Pins reused from the motor-slave env (CAN_TX=GPIO3, CAN_RX=GPIO2);
; USB-OTG PHY on the S3 is fixed at GPIO19/20 (no config needed).
[env:UC2_canopen_bridge_ps4_usbhost]
extends = env:UC2_canopen_xiao_base
lib_deps =
	${env:UC2_canopen_xiao_base.lib_deps}
	symlink://lib/esp_usb_host_hid
build_flags =
	${env:UC2_canopen_xiao_base.build_flags}
	-DNODE_ROLE=2
	-DJOYSTICK_USBHOST_PROVIDER=1
	-DCORE_DEBUG_LEVEL=3
board_build.cmake_extra_args =
	-DCONFIG=UC2_canopen_bridge_ps4_usbhost
	-DCMAKE_C_COMPILER_LAUNCHER=ccache
	-DCMAKE_CXX_COMPILER_LAUNCHER=ccache
	${env:UC2_canopen_bridge_ps4_usbhost.build_flags}





; ===========================================================================
;  Standalone FastAccelStepper test firmware  -  Seeed XIAO ESP32-S3
; ---------------------------------------------------------------------------
;  Purpose: drive ONE TMC2209 axis with FastAccelStepper and NOTHING ELSE.
;  No CANopen, no serial-command module, no module loop system, no tasks
;  of our own. This isolates FAS from the UC2 firmware so speed/accel
;  combinations can be swept and the stall-vs-complete behaviour observed
;  without any concurrency from the CANopen stack or the serial task.
;
;  This is a SELF-CONTAINED PlatformIO project. Build/flash with:
;      pio run -d fas_standalone_test -t upload
;      pio device monitor -b 115200
;  (or:  cd fas_standalone_test && pio run -t upload && pio device monitor)
;
;  Pins, TMC settings and FAS library version are copied verbatim from the
;  UC2_canopen_slave_motor configuration so the hardware behaves identically.
;
;  IMPORTANT: do NOT override board_upload.flash_size / partitions here. The
;  seeed_xiao_esp32s3 board JSON already declares 8 MB flash, qio_opi memory
;  (OPI PSRAM) and the default_8MB.csv partition table. Forcing flash_size to
;  4 MB while the board ships the 8 MB partition table makes the core fault
;  right after `entry` (boot loop) because partition records point past 4 MB.
; ===========================================================================
[env:fas_test_xiao_s3]
platform = espressif32@6.9.0
; Arduino-ESP32 2.0.15  ==  ESP-IDF 4.4  ->  same RMT driver the UC2 build uses
; (StepperISR_idf4_esp32s3_rmt.cpp). Pinning this matters: a different core
; version selects a different FAS backend and would not reproduce the issue.
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.15
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder   ; decode any panic backtrace
; 115200 (not 921600): the XIAO S3 is flashed over NATIVE USB (usbmodem),
; whose USB-serial-JTAG/CDC does not tolerate esptool's mid-flash baud
; renegotiation ("Changing baud rate to 921600 -> No serial data received").
; USB runs full-speed regardless of this nominal value, so there is no speed
; penalty. Leave at 115200 so the initial-connect baud == target baud and
; esptool skips the renegotiation entirely.
upload_speed = 115200
; --no-stub: flash via the ROM loader instead of esptool's RAM stub. Over the
; XIAO S3 native USB-CDC, starting the stub re-enumerates USB and drops the
; link ("Unable to verify flash chip connection / No serial data received")
; whenever the running app also owns USB-CDC. The ROM loader is already up, so
; --no-stub is the reliable path. Harmless when flashing over a real UART too.
upload_flags = --no-stub

build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=4

lib_deps =
	gin66/FastAccelStepper @ ^0.31.5
	teemuatlut/TMCStepper@^0.7.3
